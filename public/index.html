<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBChat // 𝝙匿名空間</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --panel-bg: #121214;
            --border-color: #26262b;
            --text-main: #e3e3e6;
            --text-muted: #6c6c75;
            --accent-green: #00ff66;
            --accent-purple: #9d4edd;
        }

        body { 
            font-family: 'Courier New', Courier, monospace, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 滿版自適應容器 */
        .wrapper {
            width: 100%;
            height: 100%;
            max-width: 800px; /* 桌機端極限寬度，保持對話視線舒適 */
            background: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        /* 歡迎與設定畫面 */
        #loginScreen {
            padding: 40px 20px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 {
            font-weight: normal;
            letter-spacing: 2px;
            color: var(--accent-purple);
            margin-bottom: 30px;
            text-transform: uppercase;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            display: block;
            margin-top: 15px;
        }

        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            box-sizing: border-box; 
            border: 1px solid var(--border-color); 
            background: #18181c; 
            color: var(--text-main);
            font-family: inherit;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--text-muted);
        }

        /* 複選標籤樣式 */
        .tag-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            margin: 12px 0;
        }

        .tag-item {
            position: relative;
        }
        .tag-item input[type="checkbox"] {
            display: none;
        }
        .tag-item label {
            display: block;
            background: #18181c;
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: center;
            cursor: pointer;
            margin: 0;
            font-size: 13px;
            color: var(--text-main);
            text-transform: none;
            transition: all 0.2s ease;
        }
        .tag-item input[type="checkbox"]:checked + label {
            background: #221929;
            border-color: var(--accent-purple);
            color: var(--accent-purple);
        }

        /* 聊天主畫面 */
        #chatScreen {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            background: #161619;
            font-size: 13px;
        }

        #statusText {
            margin: 0;
            color: var(--accent-green);
        }

        #chatBox { 
            flex: 1;
            overflow-y: auto; 
            padding: 20px; 
            background: #0e0e10;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 訊息對話泡泡與文本 */
        .msg { margin: 0; line-height: 1.5; font-size: 15px; word-break: break-all;}
        .msg .sender { color: var(--text-muted); font-size: 12px; margin-right: 8px; }
        .msg.me .sender { color: var(--accent-purple); }
        .msg.peer .sender { color: #52b788; }
        .msg.system { 
            color: var(--text-muted); 
            font-size: 12px; 
            text-align: center; 
            border-top: 1px solid #18181c;
            padding-top: 10px;
            margin: 15px 0;
        }

        /* 輸入列 */
        .input-area {
            display: flex;
            border-top: 1px solid var(--border-color);
            background: #161619;
        }
        .input-area input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 20px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 15px;
        }
        .input-area input:focus { outline: none; }

        /* 按鈕設計 */
        button { 
            padding: 12px 24px; 
            background: transparent; 
            color: var(--text-main);
            border: 1px solid var(--border-color);
            font-family: inherit;
            cursor: pointer; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        button:hover { 
            border-color: var(--text-main);
            background: #1c1c22;
        }
        .btn-submit {
            margin-top: 25px;
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            width: 100%;
            padding: 15px;
        }
        .btn-submit:hover {
            background: var(--accent-purple);
            color: #fff;
        }
        .btn-leave {
            background: transparent;
            border: none;
            border-left: 1px solid var(--border-color);
            color: #ef233c;
            font-size: 12px;
        }
        .btn-leave:hover { background: #2b1417; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- 設定與登入面板 -->
    <div id="loginScreen">
        <h2>// 𝝙_CONNECTION_SETUP</h2>
        
        <label>NICKNAME / 暱稱</label>
        <input type="text" id="nickname" placeholder="留空則顯示為神秘人...">
        
        <label>PRONOUNS / 代名詞</label>
        <input type="text" id="pronoun" placeholder="e.g. He/Him, She/Her, They/Them...">
        
        <label>FETISH TAGS / 性癖標籤 (可複選，系統優先精準配對)</label>
        <div class="tag-container">
            <div class="tag-item">
                <input type="checkbox" id="tag-dom" value="Dom/Master">
                <label for="tag-dom">Dom/Master</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-sub" value="Sub/Slave">
                <label for="tag-sub">Sub/Slave</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-switch" value="Switch">
                <label for="tag-switch">Switch</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-sadism" value="Sadism">
                <label for="tag-sadism">Sadism</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-masochism" value="Masochism">
                <label for="tag-masochism">Masochism</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-bondage" value="Bondage">
                <label for="tag-bondage">Bondage</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-leather" value="Leather/Fetish">
                <label for="tag-leather">Leather</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-cnc" value="CNC">
                <label for="tag-cnc">CNC</label>
            </div>
        </div>

        <label>OTHER / 其他自填項目</label>
        <input type="text" id="otherFetish" placeholder="輸入特定關鍵字...">

        <button class="btn-submit" onclick="startMatch()">[ INITIATE_MATCH / 開始配對 ]</button>
    </div>

    <!-- 滿版聊天面板 -->
    <div id="chatScreen" class="hidden">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
            <p id="statusText">正在同步伺服器時脈...</p>
            <button class="btn-leave" onclick="leaveChat()">[ DISCONNECT ]</button>
        </div>
        <div id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="鍵入訊息，按下 Enter 發送..." onkeypress="if(event.key==='Enter') sendMsg()">
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io({ autoConnect: false });
    const loginScreen = document.getElementById('loginScreen');
    const chatScreen = document.getElementById('chatScreen');
    const chatBox = document.getElementById('chatBox');
    const statusText = document.getElementById('statusText');

    function startMatch() {
        const nickname = document.getElementById('nickname').value.trim();
        const pronoun = document.getElementById('pronoun').value.trim();
        const otherFetish = document.getElementById('otherFetish').value.trim();
        
        // 收集複選框
        const checkedTags = [];
        document.querySelectorAll('.tag-container input[type="checkbox"]:checked').forEach(checkbox => {
            checkedTags.push(checkbox.value);
        });

        loginScreen.classList.add('hidden');
        chatScreen.classList.remove('hidden');

        socket.connect();
        socket.emit('join_match', { nickname, pronoun, tags: checkedTags, otherFetish });
    }

    socket.on('status', (msg) => {
        statusText.innerText = `// ${msg}`;
    });

    socket.on('match_success', (data) => {
        let matchInfo = `[${data.target.nickname}] (${data.target.pronoun})`;
        statusText.innerText = `CONNECTED // 與 ${matchInfo} 建立加密連線`;
        
        let sysMsg = `連線成功。建立安全通道。`;
        if(data.common && data.common.length > 0) {
            sysMsg += ` 偵測到共同頻率: ${data.common.join(', ')}`;
        }
        appendMsg('SYSTEM', sysMsg, 'system');
    });

    socket.on('receive_msg', (data) => {
        appendMsg(data.sender, data.text, 'peer');
    });

    socket.on('peer_left', (msg) => {
        appendMsg('SYSTEM', msg, 'system');
        statusText.innerText = 'DISCONNECTED // 對方已斷線';
    });

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        socket.emit('send_msg', text);
        appendMsg('我', text, 'me');
        input.value = '';
    }

    function leaveChat() {
        socket.emit('leave_room');
        socket.disconnect();
        chatBox.innerHTML = '';
        chatScreen.classList.add('hidden');
        loginScreen.classList.remove('hidden');
    }

    function appendMsg(sender, text, type) {
        const p = document.createElement('p');
        p.className = `msg ${type}`;
        
        if (type === 'system') {
            p.innerText = `[${text}]`;
        } else {
            const span = document.createElement('span');
            span.className = 'sender';
            span.innerText = `${sender}:`;
            p.appendChild(span);
            p.appendChild(document.createTextNode(text));
        }
        
        chatBox.appendChild(p);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
