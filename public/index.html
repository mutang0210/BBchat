<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBChat 匿名聊天</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #111111;
            --border-color: #ffb703; /* 經典復古琥珀橘 */
            --text-main: #ffb703;
            --text-muted: #b8860b;
            --accent-green: #39ff14; /* 螢光復古綠 */
            --input-bg: #161616;
        }

        body { 
            font-family: 'Courier New', Courier, monospace, monospace; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-weight: bold;
        }

        /* 滿版自適應容器 */
        .wrapper {
            width: 100%;
            height: 100%;
            max-width: 900px; /* 稍微拉寬，配合大字體 */
            background: var(--panel-bg);
            border-left: 3px solid var(--border-color);
            border-right: 3px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        /* 設定與登入畫面 */
        #loginScreen {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        h1 {
            font-size: 32px;
            letter-spacing: 3px;
            color: var(--text-main);
            margin: 0 0 30px 0;
            text-transform: uppercase;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 15px;
            text-shadow: 0 0 8px var(--border-color);
        }

        label {
            font-size: 16px;
            color: var(--text-main);
            letter-spacing: 1px;
            display: block;
            margin-top: 25px;
            margin-bottom: 8px;
        }

        input[type="text"] { 
            width: 100%; 
            padding: 16px; 
            box-sizing: border-box; 
            border: 2px solid var(--border-color); 
            background: var(--input-bg); 
            color: var(--text-main);
            font-family: inherit;
            font-size: 18px; /* 大字級 */
            font-weight: bold;
        }
        input[type="text"]:focus {
            outline: none;
            background: #1a1a1a;
            box-shadow: 0 0 10px var(--border-color);
        }

        /* 複選標籤大區塊樣式 */
        .tag-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); /* 加大寬度 */
            gap: 12px;
            margin: 10px 0;
        }

        .tag-item position: relative; }
        .tag-item input[type="checkbox"] { display: none; }
        .tag-item label {
            display: block;
            background: var(--input-bg);
            border: 2px solid var(--border-color);
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            margin: 0;
            font-size: 16px; /* 加大字體 */
            color: var(--text-main);
            transition: all 0.1s ease;
        }
        .tag-item input[type="checkbox"]:checked + label {
            background: var(--text-main);
            color: #000; /* 反白效果 */
            box-shadow: 0 0 12px var(--border-color);
        }

        /* 聊天主畫面 */
        #chatScreen {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 3px solid var(--border-color);
            background: #151515;
        }

        #statusText {
            margin: 0;
            font-size: 18px;
            color: var(--accent-green);
            text-shadow: 0 0 5px var(--accent-green);
        }

        #chatBox { 
            flex: 1;
            overflow-y: auto; 
            padding: 25px; 
            background: #050505;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 訊息文本 */
        .msg { 
            margin: 0; 
            line-height: 1.6; 
            font-size: 20px; /* 聊天大字體，利於清晰閱讀 */
            word-break: break-all;
        }
        .msg .sender { 
            font-size: 16px; 
            margin-right: 12px; 
            text-decoration: underline;
        }
        .msg.me { color: var(--text-main); }
        .msg.me .sender { color: var(--text-muted); }
        .msg.peer { color: var(--accent-green); }
        .msg.peer .sender { color: var(--accent-green); }
        .msg.system { 
            color: #888; 
            font-size: 15px; 
            text-align: center; 
            border-top: 2px dashed #222;
            border-bottom: 2px dashed #222;
            padding: 10px 0;
            margin: 20px 0;
        }

        /* 輸入區域 */
        .input-area {
            display: flex;
            border-top: 3px solid var(--border-color);
            background: var(--input-bg);
        }
        .input-area input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 24px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 20px;
            font-weight: bold;
        }
        .input-area input:focus { outline: none; }

        /* 大按鈕設計 */
        button { 
            padding: 15px 30px; 
            background: transparent; 
            color: var(--text-main);
            border: 2px solid var(--border-color);
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer; 
            letter-spacing: 1px;
        }
        button:hover { 
            background: var(--text-main);
            color: #000;
            box-shadow: 0 0 10px var(--border-color);
        }
        .btn-submit {
            margin-top: 35px;
            font-size: 20px;
            padding: 20px;
            width: 100%;
        }
        .btn-leave {
            background: transparent;
            border: 2px solid #ef233c;
            color: #ef233c;
            padding: 10px 20px;
        }
        .btn-leave:hover { 
            background: #ef233c; 
            color: #fff;
            box-shadow: 0 0 10px #ef233c;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- 設定與登入面板 -->
    <div id="loginScreen">
        <h1>BBChat 匿名聊天</h1>
        
        <label>> NICKNAME / 暱稱</label>
        <input type="text" id="nickname" placeholder="留空則顯示為神秘人...">
        
        <label>> PRONOUNS / 代名詞</label>
        <input type="text" id="pronoun" placeholder="e.g. He/Him, She/Her, They/Them...">
        
        <label>> FETISH TAGS / 性癖標籤 (可複選，系統優先精準配對)</label>
        <div class="tag-container">
            <div class="tag-item">
                <input type="checkbox" id="tag-dom" value="Dom/Master">
                <label for="tag-dom">Dom/Master</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-sub" value="Sub/Slave">
                <label for="tag-sub">Sub/Slave</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-switch" value="Switch">
                <label for="tag-switch">Switch</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-sadism" value="Sadism">
                <label for="tag-sadism">Sadism</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-masochism" value="Masochism">
                <label for="tag-masochism">Masochism</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-bondage" value="Bondage">
                <label for="tag-bondage">Bondage</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-leather" value="Leather/Fetish">
                <label for="tag-leather">Leather</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-cnc" value="CNC">
                <label for="tag-cnc">CNC</label>
            </div>
        </div>

        <label>> OTHER / 其他自填項目</label>
        <input type="text" id="otherFetish" placeholder="輸入特定關鍵字...">

        <button class="btn-submit" onclick="startMatch()">[ 開始配對 ]</button>
    </div>

    <!-- 滿版聊天面板 -->
    <div id="chatScreen" class="hidden">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
            <p id="statusText">正在同步伺服器時脈...</p>
            <button class="btn-leave" onclick="leaveChat()">[ 斷開連線 ]</button>
        </div>
        <div id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="鍵入訊息，按下 Enter 發送..." onkeypress="if(event.key==='Enter') sendMsg()">
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io({ autoConnect: false });
    const loginScreen = document.getElementById('loginScreen');
    const chatScreen = document.getElementById('chatScreen');
    const chatBox = document.getElementById('chatBox');
    const statusText = document.getElementById('statusText');

    function startMatch() {
        const nickname = document.getElementById('nickname').value.trim();
        const pronoun = document.getElementById('pronoun').value.trim();
        const otherFetish = document.getElementById('otherFetish').value.trim();
        
        const checkedTags = [];
        document.querySelectorAll('.tag-container input[type="checkbox"]:checked').forEach(checkbox => {
            checkedTags.push(checkbox.value);
        });

        loginScreen.classList.add('hidden');
        chatScreen.classList.remove('hidden');

        socket.connect();
        socket.emit('join_match', { nickname, pronoun, tags: checkedTags, otherFetish });
    }

    socket.on('status', (msg) => {
        statusText.innerText = `// ${msg}`;
    });

    socket.on('match_success', (data) => {
        let matchInfo = `[${data.target.nickname}] (${data.target.pronoun})`;
        statusText.innerText = `CONNECTED // 與 ${matchInfo} 建立安全連線`;
        
        let sysMsg = `連線成功。`;
        if(data.common && data.common.length > 0) {
            sysMsg += ` 偵測到共同興趣信號: ${data.common.join(', ')}`;
        }
        appendMsg('SYSTEM', sysMsg, 'system');
    });

    socket.on('receive_msg', (data) => {
        appendMsg(data.sender, data.text, 'peer');
    });

    socket.on('peer_left', (msg) => {
        appendMsg('SYSTEM', msg, 'system');
        statusText.innerText = 'DISCONNECTED // 對方已斷開信號';
    });

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        socket.emit('send_msg', text);
        appendMsg('我', text, 'me');
        input.value = '';
    }

    function leaveChat() {
        socket.emit('leave_room');
        socket.disconnect();
        chatBox.innerHTML = '';
        chatScreen.classList.add('hidden');
        loginScreen.classList.remove('hidden');
    }

    function appendMsg(sender, text, type) {
        const p = document.createElement('p');
        p.className = `msg ${type}`;
        
        if (type === 'system') {
            p.innerText = `<< ${text} >>`;
        } else {
            const span = document.createElement('span');
            span.className = 'sender';
            span.innerText = `${sender}`;
            p.appendChild(span);
            p.appendChild(document.createTextNode(`: ${text}`));
        }
        
        chatBox.appendChild(p);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
