<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBChat 匿名聊天</title>
    <style>
        :root {
            --bg-color: #141416;       /* 溫和的極深灰黑，非純黑，減少眼睛壓力 */
            --panel-bg: #1c1c1f;       /* 面板採用帶灰調的深色 */
            --border-color: #3a3a3e;   /* 柔和的低對比灰線 */
            --text-main: #e3e3e8;      /* 象牙白，最適合長時間閱讀 */
            --text-muted: #8a8a93;     /* 溫和的低飽和中灰 */
            --accent-soft: #81c784;    /* 溫和的護眼草綠色 */
            --input-bg: #222226;       /* 輸入框背景 */
            --tag-checked-bg: #2d312e; /* 標籤選中時的低飽和綠灰底 */
            
            /* 補回光暈效果的陰影設定 */
            --glow-main: 0 0 8px rgba(227, 227, 232, 0.4);
            --glow-soft: 0 0 8px rgba(129, 199, 132, 0.5);
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-weight: bold;
        }

        /* 自適應滿版大框架 */
        .wrapper {
            width: 100%;
            height: 100%;
            max-width: 850px; 
            background: var(--panel-bg);
            border-left: 2px solid var(--border-color);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        /* 設定面板 */
        #loginScreen {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        h1 {
            font-size: 28px;
            letter-spacing: 2px;
            color: var(--text-main);
            margin: 0 0 30px 0;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            /* 補回大標題光暈 */
            text-shadow: var(--glow-main);
        }

        label {
            font-size: 15px;
            color: var(--text-muted);
            letter-spacing: 1px;
            display: block;
            margin-top: 25px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input[type="text"] { 
            width: 100%; 
            padding: 16px; 
            box-sizing: border-box; 
            border: 2px solid var(--border-color); 
            background: var(--input-bg); 
            color: var(--text-main);
            font-family: inherit;
            font-size: 18px; 
            font-weight: bold;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--text-main);
            box-shadow: var(--glow-main);
        }

        /* 複選標籤排版 */
        .tag-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px;
            margin: 10px 0;
        }

        .tag-item { position: relative; }
        .tag-item input[type="checkbox"] { display: none; }
        .tag-item label {
            display: block;
            background: var(--input-bg);
            border: 2px solid var(--border-color);
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            margin: 0;
            font-size: 16px; 
            color: var(--text-main);
            transition: all 0.15s ease;
        }
        .tag-item input[type="checkbox"]:checked + label {
            background: var(--tag-checked-bg);
            border-color: var(--accent-soft);
            color: var(--accent-soft);
            /* 選中標籤補回柔和綠光暈 */
            text-shadow: var(--glow-soft);
            box-shadow: inset 0 0 4px rgba(129, 199, 132, 0.2);
        }

        /* 聊天主畫面 */
        #chatScreen {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 2px solid var(--border-color);
            background: #19191c;
        }

        #statusText {
            margin: 0;
            font-size: 16px;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        #chatBox { 
            flex: 1;
            overflow-y: auto; 
            padding: 25px; 
            background: #141416; /* 深灰底，低反光 */
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 聊天訊息 */
        .msg { 
            margin: 0; 
            line-height: 1.6; 
            font-size: 19px; 
            word-break: break-all;
        }
        .msg .sender { 
            font-size: 15px; 
            margin-right: 12px; 
            color: var(--text-muted);
        }
        .msg.me { 
            color: var(--text-main); 
            /* 我的訊息微光暈 */
            text-shadow: var(--glow-main);
        }
        .msg.me .sender { color: var(--text-muted); text-shadow: none; }
        
        .msg.peer { 
            color: var(--accent-soft); 
            /* 陌生人訊息綠光暈 */
            text-shadow: var(--glow-soft);
        }
        .msg.peer .sender { color: var(--accent-soft); opacity: 0.8; }
        
        .msg.system { 
            color: var(--text-muted); 
            font-size: 14px; 
            text-align: center; 
            border-top: 1px dashed var(--border-color);
            border-bottom: 1px dashed var(--border-color);
            padding: 10px 0;
            margin: 20px 0;
            font-weight: normal;
            text-shadow: none;
        }

        /* 輸入區域 */
        .input-area {
            display: flex;
            border-top: 2px solid var(--border-color);
            background: var(--input-bg);
        }
        .input-area input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 24px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 19px;
            font-weight: bold;
        }
        .input-area input:focus { outline: none; }

        /* 按鈕設計 */
        button { 
            padding: 15px 30px; 
            background: transparent; 
            color: var(--text-main);
            border: 2px solid var(--border-color);
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer; 
            transition: all 0.15s ease;
        }
        button:hover { 
            border-color: var(--text-main);
            background: #252529;
            box-shadow: var(--glow-main);
        }
        .btn-submit {
            margin-top: 35px;
            font-size: 18px;
            padding: 18px;
            width: 100%;
            border-color: var(--text-muted);
        }
        .btn-submit:hover {
            border-color: var(--text-main);
        }
        .btn-leave {
            background: transparent;
            border: 2px solid #b33939;
            color: #d1ccc0;
            padding: 8px 16px;
            font-size: 14px;
        }
        .btn-leave:hover { 
            background: #b33939; 
            color: #fff;
            box-shadow: 0 0 8px #b33939;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- 設定與登入面板 -->
    <div id="loginScreen">
        <h1>BBChat 匿名聊天</h1>
        
        <label>Nickname / 暱稱</label>
        <input type="text" id="nickname" placeholder="留空則顯示為神秘人...">
        
        <label>Pronouns / 代名詞</label>
        <input type="text" id="pronoun" placeholder="e.g. 他/她, 大野狼, 小母狗, 小豬仔, 飛天鼠...">
        
        <label>Fetish Tags / 性癖標籤 (可複選，系統優先精準配對)</label>
        <div class="tag-container">
            <div class="tag-item">
                <input type="checkbox" id="tag-dom" value="Dom/Master">
                <label for="tag-dom">Dom/Master</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-sub" value="Sub/Slave">
                <label for="tag-sub">Sub/Slave</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-switch" value="Switch">
                <label for="tag-switch">Switch</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-sadism" value="Sadism">
                <label for="tag-sadism">Sadism</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-masochism" value="Masochism">
                <label for="tag-masochism">Masochism</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-bondage" value="Bondage">
                <label for="tag-bondage">Bondage</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-leather" value="Leather/Fetish">
                <label for="tag-leather">Leather</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-spanking" value="Spanking">
                <label for="tag-spanking">Spanking</label>
            </div>
            <div class="tag-item">
                <input type="checkbox" id="tag-cnc" value="CNC">
                <label for="tag-cnc">CNC</label>
            </div>
        </div>

        <label>Other / 其他自填項目</label>
        <input type="text" id="otherFetish" placeholder="輸入特定關鍵字...">

        <button class="btn-submit" onclick="startMatch()">[ 開始配對 ]</button>
    </div>

    <!-- 滿版聊天面板 -->
    <div id="chatScreen" class="hidden">
        <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
            <p id="statusText">正在同步解密BB通道...</p>
            <button class="btn-leave" onclick="leaveChat()">不想聊了</button>
        </div>
        <div id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="輸入訊息，按下 Enter 發送..." onkeypress="if(event.key==='Enter') sendMsg()">
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io({ autoConnect: false });
    const loginScreen = document.getElementById('loginScreen');
    const chatScreen = document.getElementById('chatScreen');
    const chatBox = document.getElementById('chatBox');
    const statusText = document.getElementById('statusText');

    function startMatch() {
        const nickname = document.getElementById('nickname').value.trim();
        const pronoun = document.getElementById('pronoun').value.trim();
        const otherFetish = document.getElementById('otherFetish').value.trim();
        
        const checkedTags = [];
        document.querySelectorAll('.tag-container input[type="checkbox"]:checked').forEach(checkbox => {
            checkedTags.push(checkbox.value);
        });

        loginScreen.classList.add('hidden');
        chatScreen.classList.remove('hidden');

        socket.connect();
        socket.emit('join_match', { nickname, pronoun, tags: checkedTags, otherFetish });
    }

    socket.on('status', (msg) => {
        statusText.innerText = `// ${msg}`;
    });

    socket.on('match_success', (data) => {
        let matchInfo = `${data.target.nickname} (${data.target.pronoun})`;
        statusText.innerText = `已連接至系統 // 陌生人: ${matchInfo}`;
        statusText.style.color = "var(--accent-soft)";
        statusText.style.textShadow = "var(--glow-soft)";
        
        let sysMsg = `安全連線建立成功。`;
        if(data.common && data.common.length > 0) {
            sysMsg += ` 共同標籤: ${data.common.join(', ')}`;
        }
        appendMsg('SYSTEM', sysMsg, 'system');
    });

    socket.on('receive_msg', (data) => {
        appendMsg(data.sender, data.text, 'peer');
    });

    socket.on('peer_left', (msg) => {
        appendMsg('SYSTEM', msg, 'system');
        statusText.innerText = '連線已中斷';
        statusText.style.color = "var(--text-muted)";
        statusText.style.textShadow = "none";
    });

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        socket.emit('send_msg', text);
        appendMsg('我', text, 'me');
        input.value = '';
    }

    function leaveChat() {
        socket.emit('leave_room');
        socket.disconnect();
        chatBox.innerHTML = '';
        chatScreen.classList.add('hidden');
        loginScreen.classList.remove('hidden');
    }

    function appendMsg(sender, text, type) {
        const p = document.createElement('p');
        p.className = `msg ${type}`;
        
        if (type === 'system') {
            p.innerText = `[ 系統通知: ${text} ]`;
        } else {
            const span = document.createElement('span');
            span.className = 'sender';
            span.innerText = sender;
            p.appendChild(span);
            p.appendChild(document.createTextNode(`: ${text}`));
        }
        
        chatBox.appendChild(p);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
